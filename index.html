<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sky Chat</title>
<style>
:root {
  /* カラーパレットをより洗練されたトーンに微調整 */
  --bg: #1e1f22;
  --sidebar-bg: #2b2d31;
  --panel: #2b2d31;
  --panel2: #313338;
  --text: #f2f3f5;
  --sub: #949ba4;
  --accent: #5865f2;
  --accent-hover: #4752c4;
  --green: #23a55a;
  --radius-lg: 16px;
  --radius-md: 8px;
  --transition: all 0.2s ease;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
}

body {
  background: var(--bg);
  height: 100vh;
  display: flex;
  overflow: hidden;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

/* --- サイドバー --- */
#sidebar {
  width: 260px;
  background: var(--sidebar-bg);
  display: flex;
  flex-direction: column;
  border-right: 1px solid rgba(255, 255, 255, 0.05);
}

#logo {
  padding: 24px 20px;
  font-size: 20px;
  font-weight: 800;
  letter-spacing: 0.5px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
}

#userinfo {
  padding: 20px;
  font-size: 13px;
  color: var(--sub);
  font-weight: 600;
}

#username {
  width: 100%;
  padding: 10px 12px;
  margin-top: 8px;
  border: 1px solid rgba(0, 0, 0, 0.2);
  border-radius: var(--radius-md);
  background: #1e1f22;
  color: var(--text);
  font-size: 14px;
  transition: var(--transition);
}

#username:focus {
  outline: none;
  border-color: var(--accent);
}

#room-list {
  flex: 1;
  overflow-y: auto;
  padding: 10px 8px;
}

.room {
  padding: 10px 12px;
  border-radius: var(--radius-md);
  cursor: pointer;
  color: var(--sub);
  font-weight: 600;
  margin-bottom: 2px;
  transition: var(--transition);
}

.room:hover {
  background: rgba(255, 255, 255, 0.06);
  color: var(--text);
}

.room.active {
  background: rgba(255, 255, 255, 0.1);
  color: var(--text);
}

/* --- メインエリア --- */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--panel2);
}

#header {
  height: 60px;
  background: var(--panel2);
  display: flex;
  align-items: center;
  padding: 0 24px;
  font-size: 16px;
  font-weight: 700;
  border-bottom: 1px solid rgba(0, 0, 0, 0.2);
}

/* --- メッセージエリア --- */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.message {
  max-width: 65%;
  background: var(--sidebar-bg);
  padding: 14px 16px;
  border-radius: 0 var(--radius-lg) var(--radius-lg) var(--radius-lg); /* 左上だけ角を立たせる */
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
  animation: fade 0.25s ease-out;
  line-height: 1.5;
  font-size: 15px;
}

/* 自分のメッセージ */
.message.self {
  align-self: flex-end;
  background: var(--accent);
  border-radius: var(--radius-lg) 0 var(--radius-lg) var(--radius-lg); /* 右上だけ角を立たせる */
}

.name {
  font-size: 13px;
  font-weight: 700;
  color: var(--sub);
  margin-bottom: 6px;
}
.message.self .name {
  color: rgba(255, 255, 255, 0.8);
}

.time {
  font-size: 11px;
  color: var(--sub);
  margin-top: 6px;
  text-align: right;
}
.message.self .time {
  color: rgba(255, 255, 255, 0.7);
}

/* リッチテキスト（Markdown）用 */
.inline-code {
  background: rgba(0, 0, 0, 0.25);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: Consolas, Monaco, monospace;
  font-size: 0.9em;
  color: #ff79c6; /* コードを少し目立たせる色 */
}
.message.self .inline-code {
  background: rgba(0, 0, 0, 0.2);
  color: #fff;
}

/* --- 下部入力エリア --- */
#bottom {
  background: var(--panel2);
  padding: 0 24px 24px 24px;
  display: flex;
  gap: 12px;
  align-items: flex-end;
}

#text {
  flex: 1;
  resize: none;
  height: 48px;
  max-height: 150px;
  border: none;
  border-radius: var(--radius-md);
  padding: 14px 16px;
  background: #383a40;
  color: var(--text);
  font-size: 15px;
  line-height: 1.4;
  transition: var(--transition);
}

#text:focus {
  outline: none;
}

button {
  height: 48px;
  padding: 0 24px;
  border: none;
  border-radius: var(--radius-md);
  background: var(--accent);
  color: white;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
}

button:hover {
  background: var(--accent-hover);
}

/* ⚙ボタン用の微調整 */
button[onclick="openSetting()"] {
  background: #4e5058;
  padding: 0 16px;
}
button[onclick="openSetting()"]:hover {
  background: #6d6f78;
}

/* --- 通知・モーダル --- */
#toast {
  position: fixed;
  bottom: 32px;
  right: 32px;
  background: var(--green);
  color: white;
  padding: 12px 24px;
  border-radius: var(--radius-md);
  font-weight: 600;
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
  display: none;
  z-index: 100;
}

.modal {
  position: fixed;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(4px); /* 背景を少しぼかす */
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 200;
}

.modal-content {
  width: 400px;
  background: var(--sidebar-bg);
  padding: 28px;
  border-radius: var(--radius-lg);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
}

.modal-content h2 {
  font-size: 20px;
  margin-bottom: 20px;
}

.setting {
  margin-top: 20px;
  font-size: 14px;
  color: var(--sub);
}

.setting input {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  background: #1e1f22;
  border: 1px solid rgba(0,0,0,0.2);
  border-radius: var(--radius-md);
  color: white;
}

.setting input:focus {
  outline: none;
  border-color: var(--accent);
}

.setting-buttons {
  margin-top: 24px;
  display: flex;
  gap: 12px;
  justify-content: flex-end;
}

@keyframes fade {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* スマホ対応 */
@media(max-width:700px){
  #sidebar { display: none; }
  .message { max-width: 85%; }
  #bottom { padding: 0 12px 12px 12px; }
}
</style>
</head>
<body>

<div id="sidebar">
  <div id="logo">☁ Sky Chat</div>
  <div id="userinfo">
    <div>あなたの名前</div>
    <input id="username">
  </div>
  <div id="room-list"></div>
</div>

<div id="main">
  <div id="header">Sky Chat</div>
  <div id="messages"></div>
  <div id="bottom">
    <textarea id="text" placeholder="メッセージを入力&#10;Shift+Enterで改行&#10;Enterで送信"></textarea>
    <button onclick="send()">送信</button>
    <button onclick="openSetting()">⚙</button>
  </div>
</div>

<div id="toast">送信しました</div>

<div class="modal" id="setting">
  <div class="modal-content">
    <h2>設定</h2>
    <div class="setting">
      表示名
      <input id="settingName">
    </div>
    <div class="setting">
      <button onclick="saveSetting()">保存</button>
      <button onclick="closeSetting()">閉じる</button>
    </div>
  </div>
</div>

<script>
// WebアプリのURLをここに貼り付けてください
const GAS="https://script.google.com/macros/s/AKfycbyKWav6fidXMcRB4xyCBeT5_DDf0ZpYiZ21Ir4wEiqyl80xItyOexTOF_P8aQJQulloaQ/exec";

const App={
  user:"",
  room:"雑談", // 初期デフォルトルーム
  messages:[],
  rooms: ["雑談"] // 初期ルームリスト（読み込みまでのフォールバック）
}

function init(){
  App.user = localStorage.getItem("user") || "名無し";
  username.value = App.user;
  settingName.value = App.user;
  
  load();
  setInterval(load, 2000);
}

function saveSetting(){
  App.user = settingName.value;
  username.value = App.user;
  localStorage.setItem("user", App.user);
  closeSetting();
}
function openSetting(){ setting.style.display="flex"; }
function closeSetting(){ setting.style.display="none"; }

function toast(text){
  const toastBox = document.getElementById("toast");
  toastBox.innerHTML = text;
  toastBox.style.display = "block";
  setTimeout(()=>{ toastBox.style.display="none"; }, 1500);
}

// サイドバーのルーム一覧を動的に描画
function renderRooms(){
  const container = document.getElementById("room-list");
  container.innerHTML = "";
  
  App.rooms.forEach(rName => {
    let div = document.createElement("div");
    div.className = "room";
    if(rName === App.room) {
      div.classList.add("active");
    }
    div.innerText = `# ${rName}`;
    
    div.onclick = () => {
      document.querySelectorAll(".room").forEach(v => v.classList.remove("active"));
      div.classList.add("active");
      App.room = rName;
      load();
    };
    container.appendChild(div);
  });
}

// メッセージのレンダリング
// メッセージのレンダリング（変更があった時だけ中身を書き換える）
function render(){
  // 画面上のメッセージ数と、新しく届いたデータ数が同じなら何もしない（アニメーションの再発防止）
  const currentDOMCount = messages.querySelectorAll(".message").length;
  if (currentDOMCount === App.messages.length) {
    return; 
  }

  messages.innerHTML = "";
  App.messages.forEach(v => {
    let div = document.createElement("div");
    div.className = "message";
    if(v.user == App.user){
      div.classList.add("self");
    }
    div.innerHTML = `
      <div class="name">${v.user}</div>
      <div>${parseRichText(v.message)}</div>
      <div class="time">${format(v.time)}</div>
    `;
    messages.appendChild(div);
  });
  
  // スクロールを一番下に移動
  messages.scrollTop = messages.scrollHeight;
}

async function load(){
  if(!GAS) return;
  try{
    // リダイレクト追従を追加してCORS/通信を安定化
    let r = await fetch(GAS + "?room=" + encodeURIComponent(App.room), {
      method: "GET",
      redirect: "follow"
    });
    let data = await r.json();
    
    // データをアプリ状態に保存
    App.messages = data.messages || [];
    
    // ルーム一覧の動的更新
    if (data.rooms && JSON.stringify(App.rooms) !== JSON.stringify(data.rooms)) {
      App.rooms = data.rooms;
      renderRooms();
    }
    
    // 画面の描画処理へ
    render();
  }catch(e){
    console.log("読み込みエラー:", e);
  }
}

function format(t){
  let d=new Date(t);
  return d.toLocaleTimeString();
}

// 安全にエスケープした後にリッチテキスト（Markdown）化
function parseRichText(str){
  // 1. まずHTMLタグを無効化（エスケープ）
  let escaped = str
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;");
    
  // 2. 簡易Markdown変換処理
  escaped = escaped
    .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')       // **太字** -> <b>
    .replace(/__(.*?)__/g, '<u>$1</u>')           // __下線__ -> <u>
    .replace(/`(.*?)`/g, '<code class="inline-code">$1</code>') // `コード` -> <code>
    .replaceAll("\n", "<br>");                    // 改行処理
    
  return escaped;
}


async function send(){
  let msg = text.value.trim();
  if(msg == "") return;
  
  // 1. 送信データを準備
  let data = {
    user: App.user,
    room: App.room,
    message: msg,
    time: new Date() // 仮の現在時刻
  };
  
  // 2. 【ここが重要】GASの返事を待たずに、まず自分の画面（配列）に仮で追加してすぐ表示する！
  App.messages.push(data);
  render();
  
  // 入力欄を即座にクリアして、連打を防ぐ
  text.value = "";
  toast("送信中..."); // 「送信しました」から「送信中...」に変えるとより親切です
  
  if(GAS){
    try {
      // 3. 裏でこっそりGASに送信（awaitするけど、画面はもう更新されているので待たされない）
      await fetch(GAS, {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "text/plain"
        },
        body: JSON.stringify({
          user: data.user,
          room: data.room,
          message: data.message
        })
      });
      
      // 送信成功メッセージに切り替え
      toast("送信しました");
      
      // 4. 送信が完了したら、ちょっとだけ待って最新データをGASから再取得して同期する
      setTimeout(load, 1000);
    } catch(e) {
      console.log("送信エラー:", e);
      toast("送信に失敗しました");
    }
  }
}

text.addEventListener("keydown", e => {
  if(e.key === "Enter" && !e.shiftKey){
    e.preventDefault();
    send();
  }
});

username.addEventListener("change", () => {
  App.user = username.value;
  localStorage.setItem("user", App.user);
});

init();
</script>
</body>
</html>
