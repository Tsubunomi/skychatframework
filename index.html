<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0">
  <title>Sky Chat - Sweet Edition</title>
  <style>
    :root {
      /* 可愛くて見やすいマカロンカラーパレット */
      --bg-main: #f7f9fa;
      --bg-sidebar: #ffffff;
      --bg-bubble-other: #ffffff;
      --bg-bubble-self: #e3f2fd; /* 爽やかなパステルブルー */
      --bg-input: #edf2f7;
      
      --text-main: #2d3748;
      --text-muted: #718096;
      
      --color-accent: #4fd1c5; /* 優しいミントグリーン */
      --color-accent-hover: #38b2ac;
      --color-logout: #e2e8f0;
      --color-logout-text: #4a5568;
      
      /* まるみの強いかわいい装飾 */
      --radius-xl: 20px;
      --radius-lg: 14px;
      --radius-md: 10px;
      --sidebar-width: 240px;
      --header-height: 56px;
      --transition: all 0.2s ease;
      --shadow-soft: 0 4px 12px rgba(0, 0, 0, 0.05);
      --shadow-popup: 0 10px 25px rgba(0, 0, 0, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
    }

    body {
      background: var(--bg-main);
      height: 100vh;
      display: flex;
      overflow: hidden;
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
    }

    /* --- サイドバー --- */
    #sidebar {
      width: var(--sidebar-width);
      background: var(--bg-sidebar);
      display: flex;
      flex-direction: column;
      box-shadow: 2px 0 10px rgba(0, 0, 0, 0.02);
      z-index: 10;
      transition: var(--transition);
    }

    #logo {
      height: var(--header-height);
      padding: 0 20px;
      display: flex;
      align-items: center;
      font-size: 18px;
      font-weight: 800;
      color: var(--color-accent);
      border-bottom: 2px solid var(--bg-main);
    }

    #userinfo {
      padding: 16px;
      background: var(--bg-main);
      margin: 12px;
      border-radius: var(--radius-lg);
    }

    .user-meta {
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .user-id {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .user-prof-text {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #room-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .room {
      padding: 10px 14px;
      border-radius: var(--radius-md);
      cursor: pointer;
      color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 4px;
      transition: var(--transition);
    }

    .room:hover {
      background: var(--bg-main);
      color: var(--text-main);
    }

    .room.active {
      background: var(--bg-bubble-self);
      color: var(--text-main);
    }

    /* --- メインエリア --- */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-main);
      min-width: 0; /* フレックスアイテムの縮小バグ防止 */
    }

    #header {
      height: var(--header-height);
      background: #ffffff;
      display: flex;
      align-items: center;
      padding: 0 16px;
      font-size: 16px;
      font-weight: 700;
      box-shadow: 0 2px 5px rgba(0,0,0,0.02);
      gap: 12px;
    }

    #menu-trigger {
      display: none;
      background: var(--bg-main);
      border: none;
      padding: 6px 12px;
      font-size: 18px;
      border-radius: var(--radius-md);
      cursor: pointer;
    }

    /* --- メッセージエリア --- */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .message {
      max-width: 75%;
      background: var(--bg-bubble-other);
      padding: 12px 16px;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-soft);
      animation: anim-fade-up 0.2s ease-out;
      line-height: 1.5;
      font-size: 14px;
      align-self: flex-start;
      word-break: break-all;
    }

    .message.self {
      align-self: flex-end;
      background: var(--bg-bubble-self);
    }

    /* クリック可能なかわいいネームタグ */
    .name {
      font-size: 11px;
      font-weight: 700;
      color: var(--color-accent-hover);
      margin-bottom: 4px;
      display: inline-block;
      cursor: pointer;
      background: rgba(79, 209, 197, 0.1);
      padding: 2px 8px;
      border-radius: var(--radius-sm);
      transition: var(--transition);
    }
    .name:hover {
      background: rgba(79, 209, 197, 0.2);
    }

    .time {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 4px;
      text-align: right;
    }

    .inline-code {
      background: #edf2f7;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.9em;
      color: #e53e3e;
    }

    /* --- 徹底対策：はみ出さないボトム入力エリア --- */
    #bottom {
      background: #ffffff;
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      align-items: center;
      box-shadow: 0 -4px 10px rgba(0,0,0,0.02);
      width: 100%;
    }

    #text {
      flex: 1;
      min-width: 0; /* スマホ縮小時の潰れ防止 */
      resize: none;
      height: 40px;
      border: none;
      border-radius: var(--radius-xl);
      padding: 10px 16px;
      background: var(--bg-input);
      color: var(--text-main);
      font-size: 14px;
      line-height: 1.4;
      transition: var(--transition);
    }

    #text:focus {
      outline: none;
      background: #ffffff;
      box-shadow: 0 0 0 2px var(--color-accent);
    }

    button {
      height: 40px;
      padding: 0 16px;
      border: none;
      border-radius: var(--radius-xl);
      background: var(--color-accent);
      color: white;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      flex-shrink: 0; /* ボタンが画面外に押し潰されるのを防ぐ */
    }

    button:hover {
      background: var(--color-accent-hover);
    }

    .btn-logout {
      background: var(--color-logout);
      color: var(--color-logout-text);
    }
    .btn-logout:hover {
      background: #cbd5e0;
    }

    /* --- モーダルポップアップ --- */
    .modal {
      position: fixed;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(2px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 200;
      padding: 16px;
    }

    .modal-content {
      width: 100%;
      max-width: 340px;
      background: #ffffff;
      padding: 24px;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-popup);
      animation: anim-fade-up 0.25s ease-out;
    }

    .modal-content h2 {
      font-size: 18px;
      margin-bottom: 16px;
      text-align: center;
      color: var(--text-main);
    }

    /* プロフィール確認モーダル用の特別スタイル */
    .prof-view-title {
      font-size: 20px;
      font-weight: 800;
      text-align: center;
      color: var(--text-main);
    }
    .prof-view-id {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 16px;
    }
    .prof-view-body {
      background: var(--bg-main);
      padding: 16px;
      border-radius: var(--radius-lg);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 16px;
      min-height: 60px;
      word-break: break-all;
    }

    .setting {
      margin-top: 12px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .setting input {
      width: 100%;
      padding: 10px 12px;
      margin-top: 4px;
      margin-bottom: 8px;
      background: var(--bg-main);
      border: 1px solid #edf2f7;
      border-radius: var(--radius-md);
      color: var(--text-main);
      font-size: 14px;
    }

    .setting input:focus {
      outline: none;
      border-color: var(--color-accent);
      background: #ffffff;
    }

    .modal button {
      width: 100%;
      margin-top: 6px;
    }

    #toast {
      position: fixed;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(45, 55, 72, 0.9);
      color: white;
      padding: 10px 20px;
      border-radius: var(--radius-xl);
      font-size: 13px;
      font-weight: 600;
      box-shadow: var(--shadow-popup);
      display: none;
      z-index: 300;
    }

    #sidebar-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.3);
      z-index: 5;
    }

    @keyframes anim-fade-up {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* --- スマートフォン対応の最適化 --- */
    @media (max-width: 600px) {
      #menu-trigger { display: block; }
      #sidebar {
        position: fixed;
        left: calc(-1 * var(--sidebar-width));
        top: 0;
        bottom: 0;
        height: 100vh;
      }
      #sidebar.mobile-open { left: 0; }
      .message { max-width: 85%; }
      #bottom { padding: 10px; gap: 6px; }
      #text { padding: 10px 14px; }
      button { padding: 0 12px; font-size: 12px; }
    }
  </style>
</head>
<body>

<div id="sidebar-overlay" onclick="toggleSidebar(false)"></div>

<div id="sidebar">
  <div id="logo">☁ Sky Chat v1.2.1</div>
  <div id="userinfo">
    <div class="user-meta">
      <span id="display-nickname">---</span>
      <span onclick="openProfileModal()" style="cursor:pointer; font-size:14px; color:var(--text-muted);" title="プロフィール設定">⚙ 設定</span>
    </div>
    <div class="user-id">ID: <span id="display-username">---</span></div>
    <div class="user-prof-text" id="display-profile"></div>
  </div>
  <div id="room-list"></div>
</div>

<div id="main">
  <div id="header">
    <button id="menu-trigger" onclick="toggleSidebar(true)">☰ メニュー</button>
    <span id="header-title"># 雑談</span>
  </div>
  <div id="messages"></div>
  <div id="bottom">
    <textarea id="text" placeholder="メッセージを入力..."></textarea>
    <button onclick="send()">送信</button>
    <button onclick="logout()" class="btn-logout">ログアウト</button>
  </div>
</div>

<div id="toast">送信しました</div>

<div class="modal" id="loginModal">
  <div class="modal-content">
    <h2>Sky Chat ログイン</h2>
    <div class="setting">
      ユーザー名
      <input id="loginUser" placeholder="ユーザー名を入力">
      パスワード
      <input id="loginPass" type="password" placeholder="パスワードを入力">
    </div>
    <button onclick="login()">ログイン</button>
  </div>
</div>

<div class="modal" id="profileModal" style="display:none;">
  <div class="modal-content">
    <h2>プロフィール設定</h2>
    <div class="setting">
      表示名（ニックネーム）
      <input id="editNickname" placeholder="表示名を入力">
      ひとことプロフィール
      <input id="editProfile" placeholder="趣味やステータスを入力">
    </div>
    <button onclick="saveProfile()">保存する</button>
    <button onclick="closeProfileModal()" class="btn-logout" style="margin-top: 8px;">閉じる</button>
  </div>
</div>

<div class="modal" id="viewProfileModal" style="display:none;" onclick="closeViewProfileModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="prof-view-title" id="viewNick">---</div>
    <div class="prof-view-id">ID: <span id="viewUser">---</span></div>
    <div class="prof-view-body" id="viewProf">ここにプロフィールが入ります。</div>
    <button onclick="document.getElementById('viewProfileModal').style.display='none'">閉じる</button>
  </div>
</div>

<script>
const GAS = "https://script.google.com/macros/s/AKfycbyKWav6fidXMcRB4xyCBeT5_DDf0ZpYiZ21Ir4wEiqyl80xItyOexTOF_P8aQJQulloaQ/exec";

const App = {
  authUser: "",
  authPass: "",
  room: "雑談", 
  messages: [],
  rooms: ["雑談"] 
}

// ユーザー名からプロフィール情報を即座に引くためのキャッシュマップ
let globalUserMap = {};

function init() {
  App.authUser = localStorage.getItem("chat_user") || "";
  App.authPass = localStorage.getItem("chat_pass") || "";
  
  if(App.authUser && App.authPass) {
    document.getElementById("loginModal").style.display = "none";
    document.getElementById("display-username").innerText = App.authUser;
    load();
    setInterval(load, 2000);
  } else {
    document.getElementById("loginModal").style.display = "flex";
  }
}

function toggleSidebar(open) {
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("sidebar-overlay");
  if(open) {
    sidebar.classList.add("mobile-open");
    overlay.style.display = "block";
  } else {
    sidebar.classList.remove("mobile-open");
    overlay.style.display = "none";
  }
}

// ★ 新設：名前をクリックしたときにプロフィールポップアップを呼び出す関数
function showUserProfile(username) {
  const user = globalUserMap[username];
  
  document.getElementById("viewUser").innerText = username;
  if (user) {
    document.getElementById("viewNick").innerText = user.nickname || username;
    document.getElementById("viewProf").innerText = user.profile || "ひとことプロフィールは未設定です。";
  } else {
    // キャッシュがない場合（マイクラ連携ユーザーや新規ユーザーなど）
    document.getElementById("viewNick").innerText = username;
    document.getElementById("viewProf").innerText = "Minecraftまたは外部システムから参加中のユーザーです。";
  }
  document.getElementById("viewProfileModal").style.display = "flex";
}

function closeViewProfileModal(e) {
  document.getElementById("viewProfileModal").style.display = "none";
}

async function login() {
  const u = document.getElementById("loginUser").value.trim();
  const p = document.getElementById("loginPass").value.trim();
  if(!u || !p) return alert("両方入力してください");
  
  try {
    let r = await fetch(`${GAS}?room=雑談&authUser=${encodeURIComponent(u)}&authPass=${encodeURIComponent(p)}`, {
      method: "GET", redirect: "follow"
    });
    let data = await r.json();
    
    if(data.error) {
      alert("ユーザー名またはパスワードが正しくありません");
    } else {
      localStorage.setItem("chat_user", u);
      localStorage.setItem("chat_pass", p);
      App.authUser = u;
      App.authPass = p;
      document.getElementById("loginModal").style.display = "none";
      document.getElementById("display-username").innerText = u;
      
      App.messages = data.messages || [];
      if(data.rooms) App.rooms = data.rooms;
      
      if(data.myProfile){
        document.getElementById("display-nickname").innerText = data.myProfile.nickname || u;
        document.getElementById("display-profile").innerText = data.myProfile.profile || "";
      }
      renderRooms();
      render();
      setInterval(load, 2000);
    }
  } catch(e) {
    alert("通信に失敗しました");
  }
}

function logout() {
  localStorage.removeItem("chat_user");
  localStorage.removeItem("chat_pass");
  location.reload();
}

function openProfileModal(){
  document.getElementById("editNickname").value = document.getElementById("display-nickname").innerText;
  document.getElementById("editProfile").value = document.getElementById("display-profile").innerText;
  document.getElementById("profileModal").style.display = "flex";
}
function closeProfileModal(){
  document.getElementById("profileModal").style.display = "none";
}

async function saveProfile(){
  const nick = document.getElementById("editNickname").value.trim();
  const prof = document.getElementById("editProfile").value.trim();
  if(!nick) return alert("表示名を入力してください");

  toast("更新中...");
  try {
    await fetch(GAS, {
      method: "POST", mode: "no-cors",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({
        action: "updateProfile", authUser: App.authUser, authPass: App.authPass, nickname: nick, profile: prof
      })
    });
    document.getElementById("display-nickname").innerText = nick;
    document.getElementById("display-profile").innerText = prof;
    closeProfileModal();
    toast("更新しました");
    load();
  } catch(e) {
    toast("更新に失敗しました");
  }
}

function toast(text){
  const toastBox = document.getElementById("toast");
  toastBox.innerHTML = text;
  toastBox.style.display = "block";
  setTimeout(()=>{ toastBox.style.display="none"; }, 1500);
}

function renderRooms(){
  const container = document.getElementById("room-list");
  container.innerHTML = "";
  App.rooms.forEach(rName => {
    let div = document.createElement("div");
    div.className = "room";
    if(rName === App.room) div.classList.add("active");
    div.innerText = `# ${rName}`;
    div.onclick = () => {
      App.room = rName;
      document.getElementById("header-title").innerText = `# ${rName}`;
      toggleSidebar(false);
      load();
    };
    container.appendChild(div);
  });
}

function render(){
  const messagesBox = document.getElementById("messages");
  messagesBox.innerHTML = "";
  
  App.messages.forEach(v => {
    let div = document.createElement("div");
    div.className = "message" + (v.user === App.authUser ? " self" : "");
    
    const displayName = v.nickname || v.user;
    
    // ★ 修正：onclick="showUserProfile('${v.user}')" を組み込み、誰の名前でも押せるように変更
    div.innerHTML = `
      <div class="name" onclick="showUserProfile('${v.user}')">👤 ${displayName}</div>
      <div>${parseRichText(v.message)}</div>
      <div class="time">${format(v.time)}</div>
    `;
    messagesBox.appendChild(div);
  });
  messagesBox.scrollTop = messagesBox.scrollHeight;
}

async function load(){
  if(!GAS || !App.authUser) return;
  try{
    let r = await fetch(`${GAS}?room=${encodeURIComponent(App.room)}&authUser=${encodeURIComponent(App.authUser)}&authPass=${encodeURIComponent(App.authPass)}`, {
      method: "GET", redirect: "follow"
    });
    let data = await r.json();
    if(data.error) return logout();
    
    // 他人のプロフィールをポップアップで出せるように、最新データをローカルマップにキャッシュ
    if(data.users) {
      globalUserMap = data.users;
    }
    
    let serverMessages = data.messages || [];
    App.messages = serverMessages;
    
    if (data.rooms && JSON.stringify(App.rooms) !== JSON.stringify(data.rooms)) {
      App.rooms = data.rooms;
      renderRooms();
    }
    if(data.myProfile){
      document.getElementById("display-nickname").innerText = data.myProfile.nickname || App.authUser;
      document.getElementById("display-profile").innerText = data.myProfile.profile || "";
    }
    render();
  }catch(e){
    console.log("読み込みエラー:", e);
  }
}

function format(t){
  let d = new Date(t);
  if (isNaN(d.getTime())) return t;
  let now = new Date();
  const pad = n => String(n).padStart(2, '0');
  let timeStr = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
  let diffDays = Math.floor((new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime() - new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime()) / (1000 * 60 * 60 * 24));

  if (diffDays === 0) return `今日 ${timeStr}`;
  if (diffDays === 1) return `昨日 ${timeStr}`;
  if (d.getFullYear() === now.getFullYear()) return `${pad(d.getMonth() + 1)}/${pad(d.getDate())} ${timeStr}`;
  return `${d.getFullYear()}/${pad(d.getMonth() + 1)}/${pad(d.getDate())} ${timeStr}`;
}

function parseRichText(str){
  let escaped = str.replaceAll("<", "&lt;").replaceAll(">", "&gt;");
  return escaped
    .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')       
    .replace(/__(.*?)__/g, '<u>$1</u>')           
    .replace(/`(.*?)`/g, '<code class="inline-code">$1</code>') 
    .replaceAll("\n", "<br>");                    
}

async function send(){
  const textarea = document.getElementById("text");
  let msg = textarea.value.trim();
  if(msg == "" || !App.authUser) return;
  
  let currentNick = document.getElementById("display-nickname").innerText;
  App.messages.push({
    user: App.authUser, nickname: currentNick, profile: "", room: App.room, message: msg, time: new Date()
  });
  render();
  textarea.value = "";
  
  try {
    await fetch(GAS, {
      method: "POST", mode: "no-cors",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ authUser: App.authUser, authPass: App.authPass, room: App.room, message: msg })
    });
    setTimeout(load, 200);
  } catch(e) {
    toast("送信に失敗しました");
  }
}

document.getElementById("text").addEventListener("keydown", e => {
  if(e.key === "Enter" && !e.shiftKey){
    e.preventDefault();
    send();
  }
});

init();
</script>
</body>
</html>
