<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sky Chat</title>
  <style>
    :root {
      /* カラーシステム定義 */
      --color-bg-main: #1e1f22;
      --color-bg-sidebar: #2b2d31;
      --color-bg-panel: #313338;
      --color-bg-input: #383a40;
      
      --color-text-main: #f2f3f5;
      --color-text-muted: #949ba4;
      --color-text-link: #00a8fc;
      
      --color-accent: #5865f2;
      --color-accent-hover: #4752c4;
      --color-success: #23a55a;
      --color-danger: #da373c;
      --color-dark-btn: #4e5058;
      
      /* レイアウト・装飾 */
      --radius-lg: 16px;
      --radius-md: 8px;
      --radius-sm: 4px;
      --sidebar-width: 260px;
      --header-height: 60px;
      --transition-fast: all 0.2s ease;
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2);
      --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
    }

    body {
      background: var(--color-bg-main);
      height: 100vh;
      display: flex;
      overflow: hidden;
      color: var(--color-text-main);
      -webkit-font-smoothing: antialiased;
    }

    /* --- サイドバー（レイアウト＆レスポンシブ考慮） --- */
    #sidebar {
      width: var(--sidebar-width);
      background: var(--color-bg-sidebar);
      display: flex;
      flex-direction: column;
      border-right: 1px solid rgba(255, 255, 255, 0.05);
      z-index: 10;
      transition: var(--transition-fast);
    }

    #logo {
      height: var(--header-height);
      padding: 0 20px;
      display: flex;
      align-items: center;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.5px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    #userinfo {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .user-meta {
      font-size: 15px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .user-id {
      font-size: 11px;
      color: var(--color-text-muted);
      margin-top: 4px;
    }

    .user-prof-text {
      font-size: 12px;
      color: var(--color-text-muted);
      margin-top: 6px;
      font-style: italic;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #room-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 8px;
    }

    .room {
      padding: 10px 12px;
      border-radius: var(--radius-md);
      cursor: pointer;
      color: var(--color-text-muted);
      font-weight: 600;
      margin-bottom: 4px;
      transition: var(--transition-fast);
    }

    .room:hover {
      background: rgba(255, 255, 255, 0.06);
      color: var(--color-text-main);
    }

    .room.active {
      background: rgba(255, 255, 255, 0.1);
      color: var(--color-text-main);
    }

    /* --- メインコンテンツエリア --- */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--color-bg-panel);
      position: relative;
    }

    #header {
      height: var(--header-height);
      background: var(--color-bg-panel);
      display: flex;
      align-items: center;
      padding: 0 24px;
      font-size: 16px;
      font-weight: 700;
      border-bottom: 1px solid rgba(0, 0, 0, 0.2);
      gap: 12px;
    }

    /* モバイル用メニューボタン */
    #menu-trigger {
      display: none;
      background: none;
      border: none;
      padding: 8px;
      font-size: 22px;
      color: var(--color-text-main);
      cursor: pointer;
      height: auto;
      width: auto;
    }

    /* --- メッセージタイムライン --- */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* スクリブルバーのスタイリッシュ化 */
    #messages::-webkit-scrollbar {
      width: 6px;
    }
    #messages::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 3px;
    }

    .message {
      max-width: 70%;
      background: var(--color-bg-sidebar);
      padding: 12px 16px;
      border-radius: 0 var(--radius-lg) var(--radius-lg) var(--radius-lg);
      box-shadow: var(--shadow-sm);
      animation: anim-fade-up 0.2s ease-out;
      line-height: 1.5;
      font-size: 15px;
      align-self: flex-start;
      word-break: break-all;
    }

    .message.self {
      align-self: flex-end;
      background: var(--color-accent);
      border-radius: var(--radius-lg) 0 var(--radius-lg) var(--radius-lg);
    }

    .name {
      font-size: 12px;
      font-weight: 700;
      color: var(--color-text-muted);
      margin-bottom: 4px;
      cursor: help;
      position: relative;
      display: inline-block;
    }

    .message.self .name {
      color: rgba(255, 255, 255, 0.75);
    }

    /* プロフィールポップオーバー */
    .name:hover::after {
      content: attr(data-profile);
      position: absolute;
      left: 0;
      top: -34px;
      background: #000000;
      color: #ffffff;
      padding: 6px 12px;
      font-size: 11px;
      border-radius: var(--radius-sm);
      white-space: nowrap;
      z-index: 10;
      font-weight: normal;
      box-shadow: var(--shadow-lg);
    }

    .name[data-profile=""]:hover::after {
      display: none;
    }

    .time {
      font-size: 10px;
      color: var(--color-text-muted);
      margin-top: 4px;
      text-align: right;
    }

    .message.self .time {
      color: rgba(255, 255, 255, 0.65);
    }

    /* インラインコード装飾 */
    .inline-code {
      background: rgba(0, 0, 0, 0.3);
      padding: 2px 6px;
      border-radius: var(--radius-sm);
      font-family: Consolas, Monaco, monospace;
      font-size: 0.9em;
      color: #ff79c6;
    }

    .message.self .inline-code {
      background: rgba(0, 0, 0, 0.2);
      color: #ffffff;
    }

    /* --- ボトム入力エリア --- */
    #bottom {
      background: var(--color-bg-panel);
      padding: 0 24px 24px 24px;
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    #text {
      flex: 1;
      resize: none;
      height: 48px;
      max-height: 150px;
      border: none;
      border-radius: var(--radius-md);
      padding: 14px 16px;
      background: var(--color-bg-input);
      color: var(--color-text-main);
      font-size: 15px;
      line-height: 1.4;
      transition: var(--transition-fast);
    }

    #text:focus {
      outline: none;
      box-shadow: 0 0 0 2px var(--color-accent);
    }

    button {
      height: 48px;
      padding: 0 22px;
      border: none;
      border-radius: var(--radius-md);
      background: var(--color-accent);
      color: white;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: var(--transition-fast);
      display: flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }

    button:hover {
      background: var(--color-accent-hover);
    }

    /* --- モーダル＆通知共通仕様 --- */
    #toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      background: var(--color-success);
      color: white;
      padding: 12px 24px;
      border-radius: var(--radius-md);
      font-weight: 600;
      box-shadow: var(--shadow-lg);
      display: none;
      z-index: 100;
      animation: anim-fade-up 0.2s ease-out;
    }

    .modal {
      position: fixed;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 200;
    }

    .modal-content {
      width: 100%;
      max-width: 360px;
      margin: 16px;
      background: var(--color-bg-sidebar);
      padding: 28px;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
    }

    .modal-content h2 {
      font-size: 20px;
      margin-bottom: 20px;
      text-align: center;
    }

    .setting {
      margin-top: 14px;
      font-size: 13px;
      color: var(--color-text-muted);
    }

    .setting input {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      margin-bottom: 12px;
      background: var(--color-bg-main);
      border: 1px solid rgba(0, 0, 0, 0.2);
      border-radius: var(--radius-md);
      color: white;
      font-size: 14px;
    }

    .setting input:focus {
      outline: none;
      border-color: var(--color-accent);
    }

    .modal button {
      width: 100%;
      margin-top: 8px;
    }

    /* モバイル表示用のオーバーレイ背景 */
    #sidebar-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 5;
    }

    @keyframes anim-fade-up {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* --- スマートフォン対応 (レスポンシブブレイクポイント) --- */
    @media (max-width: 768px) {
      #menu-trigger {
        display: block; /* ハンバーガーメニューを表示 */
      }

      #sidebar {
        position: fixed;
        left: calc(-1 * var(--sidebar-width)); /* 最初は画面外へ隠す */
        top: 0;
        bottom: 0;
        height: 100vh;
      }

      /* サイドバーがアクティブなときの挙動 */
      #sidebar.mobile-open {
        left: 0;
      }

      .message {
        max-width: 85%;
      }

      #bottom {
        padding: 0 16px 16px 16px;
      }
      
      button {
        padding: 0 16px; /* ボタン幅をスマホ用にスリム化 */
      }
    }
  </style>
</head>
<body>

<div id="sidebar-overlay" onclick="toggleSidebar(false)"></div>

<div id="sidebar">
  <div id="logo">☁ Sky Chat v1.2.0</div>
  <div id="userinfo">
    <div class="user-meta">
      <span id="display-nickname">---</span>
      <span onclick="openProfileModal()" style="cursor:pointer; font-size:16px; color:var(--color-text-muted);" title="プロフィール設定">⚙</span>
    </div>
    <div class="user-id">ID: <span id="display-username">---</span></div>
    <div class="user-prof-text" id="display-profile"></div>
  </div>
  <div id="room-list"></div>
</div>

<div id="main">
  <div id="header">
    <button id="menu-trigger" onclick="toggleSidebar(true)">☰</button>
    <span id="header-title">Sky Chat v1.2.0</span>
  </div>
  <div id="messages"></div>
  <div id="bottom">
    <textarea id="text" placeholder="メッセージを入力&#10;Shift+Enterで改行 / Enterで送信"></textarea>
    <button onclick="send()">送信</button>
    <button onclick="logout()" style="background: var(--color-dark-btn);">ログアウト</button>
  </div>
</div>

<div id="toast">送信しました</div>

<div class="modal" id="loginModal">
  <div class="modal-content">
    <h2>Sky Chat ログイン</h2>
    <div class="setting">
      ユーザー名
      <input id="loginUser" placeholder="ユーザー名を入力">
      パスワード
      <input id="loginPass" type="password" placeholder="パスワードを入力">
    </div>
    <button onclick="login()">ログイン</button>
  </div>
</div>

<div class="modal" id="profileModal" style="display:none;">
  <div class="modal-content">
    <h2>プロフィール設定</h2>
    <div class="setting">
      表示名（ニックネーム）
      <input id="editNickname" placeholder="表示名を入力">
      ひとことプロフィール
      <input id="editProfile" placeholder="趣味やステータスを入力">
    </div>
    <button onclick="saveProfile()">保存する</button>
    <button onclick="closeProfileModal()" style="background: var(--color-dark-btn); margin-top: 10px;">閉じる</button>
  </div>
</div>

<script>
// ※以前作成されたお使いのGAS WebアプリURLをここに反映させてください
const GAS = "https://script.google.com/macros/s/AKfycbyKWav6fidXMcRB4xyCBeT5_DDf0ZpYiZ21Ir4wEiqyl80xItyOexTOF_P8aQJQulloaQ/exec";

const App = {
  authUser: "",
  authPass: "",
  room: "雑談", 
  messages: [],
  rooms: ["雑談"] 
}

function init() {
  App.authUser = localStorage.getItem("chat_user") || "";
  App.authPass = localStorage.getItem("chat_pass") || "";
  
  if(App.authUser && App.authPass) {
    document.getElementById("loginModal").style.display = "none";
    document.getElementById("display-username").innerText = App.authUser;
    load();
    setInterval(load, 2000);
  } else {
    document.getElementById("loginModal").style.display = "flex";
  }
}

// 📱 モバイル用サイドバー開閉切り替え
function toggleSidebar(open) {
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("sidebar-overlay");
  if(open) {
    sidebar.classList.add("mobile-open");
    overlay.style.display = "block";
  } else {
    sidebar.classList.remove("mobile-open");
    overlay.style.display = "none";
  }
}

async function login() {
  const u = document.getElementById("loginUser").value.trim();
  const p = document.getElementById("loginPass").value.trim();
  if(!u || !p) return alert("両方入力してください");
  
  try {
    let r = await fetch(`${GAS}?room=雑談&authUser=${encodeURIComponent(u)}&authPass=${encodeURIComponent(p)}`, {
      method: "GET",
      redirect: "follow"
    });
    let data = await r.json();
    
    if(data.error) {
      alert("ユーザー名またはパスワードが正しくありません");
    } else {
      localStorage.setItem("chat_user", u);
      localStorage.setItem("chat_pass", p);
      App.authUser = u;
      App.authPass = p;
      
      document.getElementById("loginModal").style.display = "none";
      document.getElementById("display-username").innerText = u;
      
      App.messages = data.messages || [];
      if(data.rooms) App.rooms = data.rooms;
      
      if(data.myProfile){
        document.getElementById("display-nickname").innerText = data.myProfile.nickname || u;
        document.getElementById("display-profile").innerText = data.myProfile.profile || "";
      }
      
      renderRooms();
      render();
      setInterval(load, 2000);
    }
  } catch(e) {
    alert("認証通信に失敗しました。URLや接続を確認してください");
    console.log(e);
  }
}

function logout() {
  localStorage.removeItem("chat_user");
  localStorage.removeItem("chat_pass");
  location.reload();
}

function openProfileModal(){
  document.getElementById("editNickname").value = document.getElementById("display-nickname").innerText;
  document.getElementById("editProfile").value = document.getElementById("display-profile").innerText;
  document.getElementById("profileModal").style.display = "flex";
}
function closeProfileModal(){
  document.getElementById("profileModal").style.display = "none";
}

async function saveProfile(){
  const nick = document.getElementById("editNickname").value.trim();
  const prof = document.getElementById("editProfile").value.trim();
  if(!nick) return alert("表示名を入力してください");

  toast("更新中...");
  try {
    await fetch(GAS, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({
        action: "updateProfile",
        authUser: App.authUser,
        authPass: App.authPass,
        nickname: nick,
        profile: prof
      })
    });
    
    document.getElementById("display-nickname").innerText = nick;
    document.getElementById("display-profile").innerText = prof;
    closeProfileModal();
    toast("更新しました");
    
    load();
  } catch(e) {
    toast("更新に失敗しました");
    console.log(e);
  }
}

function toast(text){
  const toastBox = document.getElementById("toast");
  toastBox.innerHTML = text;
  toastBox.style.display = "block";
  setTimeout(()=>{ toastBox.style.display="none"; }, 1500);
}

function renderRooms(){
  const container = document.getElementById("room-list");
  container.innerHTML = "";
  
  App.rooms.forEach(rName => {
    let div = document.createElement("div");
    div.className = "room";
    if(rName === App.room) {
      div.classList.add("active");
    }
    div.innerText = `# ${rName}`;
    
    div.onclick = () => {
      document.querySelectorAll(".room").forEach(v => v.classList.remove("active"));
      div.classList.add("active");
      App.room = rName;
      document.getElementById("header-title").innerText = `# ${rName}`;
      toggleSidebar(false); // スマホで部屋を選んだら自動でドロワーを閉じる
      load();
    };
    container.appendChild(div);
  });
}

function render(){
  const messagesBox = document.getElementById("messages");
  const currentDOMCount = messagesBox.querySelectorAll(".message").length;
  if (currentDOMCount === App.messages.length) {
    return; 
  }

  messagesBox.innerHTML = "";
  App.messages.forEach(v => {
    let div = document.createElement("div");
    div.className = "message" + (v.user === App.authUser ? " self" : "");
    
    const displayName = v.nickname || v.user;
    
    div.innerHTML = `
      <div class="name" data-profile="${v.profile ? '💡 ' + v.profile : ''}">${displayName}</div>
      <div>${parseRichText(v.message)}</div>
      <div class="time">${format(v.time)}</div>
    `;
    messagesBox.appendChild(div);
  });
  
  messagesBox.scrollTop = messagesBox.scrollHeight;
}

async function load(){
  if(!GAS || !App.authUser) return;
  try{
    let r = await fetch(`${GAS}?room=${encodeURIComponent(App.room)}&authUser=${encodeURIComponent(App.authUser)}&authPass=${encodeURIComponent(App.authPass)}`, {
      method: "GET",
      redirect: "follow"
    });
    let data = await r.json();
    
    if(data.error) {
      return logout();
    }
    
    let serverMessages = data.messages || [];
    if (App.messages.length > 0 && serverMessages.length > 0) {
      let lastLocal = App.messages[App.messages.length - 1];
      let isReflected = serverMessages.some(m => m.message === lastLocal.message && m.user === lastLocal.user);
      if (!isReflected && lastLocal.user === App.authUser) {
        serverMessages.push(lastLocal);
      }
    }
    
    App.messages = serverMessages;
    
    if (data.rooms && JSON.stringify(App.rooms) !== JSON.stringify(data.rooms)) {
      App.rooms = data.rooms;
      renderRooms();
    }
    
    if(data.myProfile){
      document.getElementById("display-nickname").innerText = data.myProfile.nickname || App.authUser;
      document.getElementById("display-profile").innerText = data.myProfile.profile || "";
    }
    
    render();
  }catch(e){
    console.log("読み込みエラー:", e);
  }
}

function format(t){
  let d = new Date(t);
  if (isNaN(d.getTime())) return t;

  let now = new Date();
  const pad = n => String(n).padStart(2, '0');
  let timeStr = `${pad(d.getHours())}:${pad(d.getMinutes())}`;

  let dDate = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  let nowDate = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  let diffTime = nowDate.getTime() - dDate.getTime();
  let diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

  if (diffDays === 0) {
    return `今日 ${timeStr}`;
  } else if (diffDays === 1) {
    return `昨日 ${timeStr}`;
  } else if (d.getFullYear() === now.getFullYear()) {
    return `${pad(d.getMonth() + 1)}/${pad(d.getDate())} ${timeStr}`;
  } else {
    return `${d.getFullYear()}/${pad(d.getMonth() + 1)}/${pad(d.getDate())} ${timeStr}`;
  }
}

function parseRichText(str){
  let escaped = str.replaceAll("<", "&lt;").replaceAll(">", "&gt;");
  escaped = escaped
    .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')       
    .replace(/__(.*?)__/g, '<u>$1</u>')           
    .replace(/`(.*?)`/g, '<code class="inline-code">$1</code>') 
    .replaceAll("\n", "<br>");                    
  return escaped;
}

async function send(){
  const textarea = document.getElementById("text");
  let msg = textarea.value.trim();
  if(msg == "" || !App.authUser) return;
  
  let currentNick = document.getElementById("display-nickname").innerText;
  let localData = {
    user: App.authUser,
    nickname: currentNick === "---" ? App.authUser : currentNick,
    profile: "",
    room: App.room,
    message: msg,
    time: new Date()
  };
  
  App.messages.push(localData);
  render();
  
  textarea.value = "";
  toast("送信中...");
  
  if(GAS){
    try {
      await fetch(GAS, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({
          authUser: App.authUser,
          authPass: App.authPass,
          room: App.room,
          message: msg
        })
      });
      
      toast("送信しました");
      setTimeout(load, 500);
    } catch(e) {
      console.log("送信エラー:", e);
      toast("送信に失敗しました");
    }
  }
}

document.getElementById("text").addEventListener("keydown", e => {
  if(e.key === "Enter" && !e.shiftKey){
    e.preventDefault();
    send();
  }
});

init();
</script>
</body>
</html>
