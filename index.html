<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sky Chat</title>
<style>
:root {
  /* カラーパレットをより洗練されたトーンに微調整 */
  --bg: #1e1f22;
  --sidebar-bg: #2b2d31;
  --panel: #2b2d31;
  --panel2: #313338;
  --text: #f2f3f5;
  --sub: #949ba4;
  --accent: #5865f2;
  --accent-hover: #4752c4;
  --green: #23a55a;
  --radius-lg: 16px;
  --radius-md: 8px;
  --transition: all 0.2s ease;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
}

body {
  background: var(--bg);
  height: 100vh;
  display: flex;
  overflow: hidden;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

/* --- サイドバー --- */
#sidebar {
  width: 260px;
  background: var(--sidebar-bg);
  display: flex;
  flex-direction: column;
  border-right: 1px solid rgba(255, 255, 255, 0.05);
}

#logo {
  padding: 24px 20px;
  font-size: 20px;
  font-weight: 800;
  letter-spacing: 0.5px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
}

/* ユーザー情報エリアを整理 */
#userinfo {
  padding: 16px 20px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
}
.user-meta {
  font-size: 15px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.user-id {
  font-size: 11px;
  color: var(--sub);
  margin-top: 4px;
}
.user-prof-text {
  font-size: 12px;
  color: var(--sub);
  margin-top: 6px;
  font-style: italic;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

#room-list {
  flex: 1;
  overflow-y: auto;
  padding: 10px 8px;
}

.room {
  padding: 10px 12px;
  border-radius: var(--radius-md);
  cursor: pointer;
  color: var(--sub);
  font-weight: 600;
  margin-bottom: 2px;
  transition: var(--transition);
}

.room:hover {
  background: rgba(255, 255, 255, 0.06);
  color: var(--text);
}

.room.active {
  background: rgba(255, 255, 255, 0.1);
  color: var(--text);
}

/* --- メメインエリア --- */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--panel2);
}

#header {
  height: 60px;
  background: var(--panel2);
  display: flex;
  align-items: center;
  padding: 0 24px;
  font-size: 16px;
  font-weight: 700;
  border-bottom: 1px solid rgba(0, 0, 0, 0.2);
}

/* --- メッセージエリア --- */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.message {
  max-width: 65%;
  background: var(--sidebar-bg);
  padding: 14px 16px;
  border-radius: 0 var(--radius-lg) var(--radius-lg) var(--radius-lg);
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
  animation: fade 0.25s ease-out;
  line-height: 1.5;
  font-size: 15px;
}

.message.self {
  align-self: flex-end;
  background: var(--accent);
  border-radius: var(--radius-lg) 0 var(--radius-lg) var(--radius-lg);
}

/* 名前のホバーでプロフィールを表示する設定 */
.name {
  font-size: 13px;
  font-weight: 700;
  color: var(--sub);
  margin-bottom: 6px;
  cursor: help;
  position: relative;
  display: inline-block;
}
.message.self .name {
  color: rgba(255, 255, 255, 0.8);
}
.name:hover::after {
  content: attr(data-profile);
  position: absolute;
  left: 0;
  top: -32px;
  background: #000000;
  color: #ffffff;
  padding: 4px 10px;
  font-size: 11px;
  border-radius: 4px;
  white-space: nowrap;
  z-index: 10;
  font-weight: normal;
  box-shadow: 0 2px 8px rgba(0,0,0,0.5);
}
.name[data-profile=""]:hover::after {
  display: none;
}

.time {
  font-size: 11px;
  color: var(--sub);
  margin-top: 6px;
  text-align: right;
}
.message.self .time {
  color: rgba(255, 255, 255, 0.7);
}

.inline-code {
  background: rgba(0, 0, 0, 0.25);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: Consolas, Monaco, monospace;
  font-size: 0.9em;
  color: #ff79c6;
}
.message.self .inline-code {
  background: rgba(0, 0, 0, 0.2);
  color: #fff;
}

/* --- 下部入力エリア --- */
#bottom {
  background: var(--panel2);
  padding: 0 24px 24px 24px;
  display: flex;
  gap: 12px;
  align-items: flex-end;
}

#text {
  flex: 1;
  resize: none;
  height: 48px;
  max-height: 150px;
  border: none;
  border-radius: var(--radius-md);
  padding: 14px 16px;
  background: #383a40;
  color: var(--text);
  font-size: 15px;
  line-height: 1.4;
  transition: var(--transition);
}

#text:focus {
  outline: none;
}

button {
  height: 48px;
  padding: 0 24px;
  border: none;
  border-radius: var(--radius-md);
  background: var(--accent);
  color: white;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
}

button:hover {
  background: var(--accent-hover);
}

/* --- 通知・モーダル --- */
#toast {
  position: fixed;
  bottom: 32px;
  right: 32px;
  background: var(--green);
  color: white;
  padding: 12px 24px;
  border-radius: var(--radius-md);
  font-weight: 600;
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
  display: none;
  z-index: 100;
}

.modal {
  position: fixed;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.8);
  backdrop-filter: blur(4px);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 200;
}

.modal-content {
  width: 360px;
  background: var(--sidebar-bg);
  padding: 30px;
  border-radius: var(--radius-lg);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
}

.modal-content h2 {
  font-size: 20px;
  margin-bottom: 20px;
  text-align: center;
}

.setting {
  margin-top: 15px;
  font-size: 14px;
  color: var(--sub);
}

.setting input {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  margin-bottom: 12px;
  background: #1e1f22;
  border: 1px solid rgba(0,0,0,0.2);
  border-radius: var(--radius-md);
  color: white;
  font-size: 14px;
}

.setting input:focus {
  outline: none;
  border-color: var(--accent);
}

.modal button {
  width: 100%;
  margin-top: 8px;
}

@keyframes fade {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@media(max-width:700px){
  #sidebar { display: none; }
  .message { max-width: 85%; }
  #bottom { padding: 0 12px 12px 12px; }
}
</style>
</head>
<body>

<div id="sidebar">
  <div id="logo">☁ Sky Chat v1.1.7</div>
  <div id="userinfo">
    <div class="user-meta">
      <span id="display-nickname">---</span>
      <span onclick="openProfileModal()" style="cursor:pointer; font-size:16px; color:var(--sub);" title="プロフィール設定">⚙</span>
    </div>
    <div class="user-id">ID: <span id="display-username">---</span></div>
    <div class="user-prof-text" id="display-profile"></div>
  </div>
  <div id="room-list"></div>
</div>

<div id="main">
  <div id="header">Sky Chat v1.1.7</div>
  <div id="messages"></div>
  <div id="bottom">
    <textarea id="text" placeholder="メッセージを入力&#10;Shift+Enterで改行&#10;Enterで送信"></textarea>
    <button onclick="send()">送信</button>
    <button onclick="logout()" style="background:#4e5058;">ログアウト</button>
  </div>
</div>

<div id="toast">送信しました</div>

<div class="modal" id="loginModal">
  <div class="modal-content">
    <h2>Sky Chat ログイン</h2>
    <div class="setting">
      ユーザー名
      <input id="loginUser" placeholder="ユーザー名を入力">
      パスワード
      <input id="loginPass" type="password" placeholder="パスワードを入力">
    </div>
    <button onclick="login()">ログイン</button>
  </div>
</div>

<div class="modal" id="profileModal" style="display:none;">
  <div class="modal-content">
    <h2>プロフィール設定</h2>
    <div class="setting">
      表示名（ニックネーム）
      <input id="editNickname" placeholder="表示名を入力">
      ひとことプロフィール
      <input id="editProfile" placeholder="趣味やステータスを入力">
    </div>
    <button onclick="saveProfile()">保存する</button>
    <button onclick="closeProfileModal()" style="background:#4e5058;">閉じる</button>
  </div>
</div>

<script>
const GAS="https://script.google.com/macros/s/AKfycbyKWav6fidXMcRB4xyCBeT5_DDf0ZpYiZ21Ir4wEiqyl80xItyOexTOF_P8aQJQulloaQ/exec";

const App={
  authUser:"",
  authPass:"",
  room:"雑談", 
  messages:[],
  rooms: ["雑談"] 
}

function init(){
  App.authUser = localStorage.getItem("chat_user") || "";
  App.authPass = localStorage.getItem("chat_pass") || "";
  
  if(App.authUser && App.authPass) {
    document.getElementById("loginModal").style.display = "none";
    document.getElementById("display-username").innerText = App.authUser;
    load();
    setInterval(load, 2000);
  } else {
    document.getElementById("loginModal").style.display = "flex";
  }
}

async function login() {
  const u = document.getElementById("loginUser").value.trim();
  const p = document.getElementById("loginPass").value.trim();
  if(!u || !p) return alert("両方入力してください");
  
  try {
    let r = await fetch(`${GAS}?room=雑談&authUser=${encodeURIComponent(u)}&authPass=${encodeURIComponent(p)}`, {
      method: "GET",
      redirect: "follow"
    });
    let data = await r.json();
    
    if(data.error) {
      alert("ユーザー名またはパスワードが正しくありません");
    } else {
      localStorage.setItem("chat_user", u);
      localStorage.setItem("chat_pass", p);
      App.authUser = u;
      App.authPass = p;
      
      document.getElementById("loginModal").style.display = "none";
      document.getElementById("display-username").innerText = u;
      
      App.messages = data.messages || [];
      if(data.rooms) App.rooms = data.rooms;
      
      if(data.myProfile){
        document.getElementById("display-nickname").innerText = data.myProfile.nickname || u;
        document.getElementById("display-profile").innerText = data.myProfile.profile || "";
      }
      
      renderRooms();
      render();
      setInterval(load, 2000);
    }
  } catch(e) {
    alert("認証通信に失敗しました。URLや接続を確認してください");
    console.log(e);
  }
}

function logout() {
  localStorage.removeItem("chat_user");
  localStorage.removeItem("chat_pass");
  location.reload();
}

function openProfileModal(){
  document.getElementById("editNickname").value = document.getElementById("display-nickname").innerText;
  document.getElementById("editProfile").value = document.getElementById("display-profile").innerText;
  document.getElementById("profileModal").style.display = "flex";
}
function closeProfileModal(){
  document.getElementById("profileModal").style.display = "none";
}

async function saveProfile(){
  const nick = document.getElementById("editNickname").value.trim();
  const prof = document.getElementById("editProfile").value.trim();
  if(!nick) return alert("表示名を入力してください");

  toast("更新中...");
  try {
    await fetch(GAS, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({
        action: "updateProfile",
        authUser: App.authUser,
        authPass: App.authPass,
        nickname: nick,
        profile: prof
      })
    });
    
    document.getElementById("display-nickname").innerText = nick;
    document.getElementById("display-profile").innerText = prof;
    closeProfileModal();
    toast("更新しました");
    
    load();
  } catch(e) {
    toast("更新に失敗しました");
    console.log(e);
  }
}

function toast(text){
  const toastBox = document.getElementById("toast");
  toastBox.innerHTML = text;
  toastBox.style.display = "block";
  setTimeout(()=>{ toastBox.style.display="none"; }, 1500);
}

function renderRooms(){
  const container = document.getElementById("room-list");
  container.innerHTML = "";
  
  App.rooms.forEach(rName => {
    let div = document.createElement("div");
    div.className = "room";
    if(rName === App.room) {
      div.classList.add("active");
    }
    div.innerText = `# ${rName}`;
    
    div.onclick = () => {
      document.querySelectorAll(".room").forEach(v => v.classList.remove("active"));
      div.classList.add("active");
      App.room = rName;
      load();
    };
    container.appendChild(div);
  });
}

function render(){
  const currentDOMCount = messages.querySelectorAll(".message").length;
  if (currentDOMCount === App.messages.length) {
    return; 
  }

  messages.innerHTML = "";
  App.messages.forEach(v => {
    let div = document.createElement("div");
    div.className = "message" + (v.user === App.authUser ? " self" : "");
    
    const displayName = v.nickname || v.user;
    
    div.innerHTML = `
      <div class="name" data-profile="${v.profile ? '💡 ' + v.profile : ''}">${displayName}</div>
      <div>${parseRichText(v.message)}</div>
      <div class="time">${format(v.time)}</div>
    `;
    messages.appendChild(div);
  });
  
  messages.scrollTop = messages.scrollHeight;
}

async function load(){
  if(!GAS || !App.authUser) return;
  try{
    let r = await fetch(`${GAS}?room=${encodeURIComponent(App.room)}&authUser=${encodeURIComponent(App.authUser)}&authPass=${encodeURIComponent(App.authPass)}`, {
      method: "GET",
      redirect: "follow"
    });
    let data = await r.json();
    
    if(data.error) {
      return logout();
    }
    
    let serverMessages = data.messages || [];
    if (App.messages.length > 0 && serverMessages.length > 0) {
      let lastLocal = App.messages[App.messages.length - 1];
      let isReflected = serverMessages.some(m => m.message === lastLocal.message && m.user === lastLocal.user);
      if (!isReflected && lastLocal.user === App.authUser) {
        serverMessages.push(lastLocal);
      }
    }
    
    App.messages = serverMessages;
    
    if (data.rooms && JSON.stringify(App.rooms) !== JSON.stringify(data.rooms)) {
      App.rooms = data.rooms;
      renderRooms();
    }
    
    if(data.myProfile){
      document.getElementById("display-nickname").innerText = data.myProfile.nickname || App.authUser;
      document.getElementById("display-profile").innerText = data.myProfile.profile || "";
    }
    
    render();
  }catch(e){
    console.log("読み込みエラー:", e);
  }
}

// 🕒 日時表示のスマートフォーマット関数
function format(t){
  let d = new Date(t);
  if (isNaN(d.getTime())) return t; // 解析できない形式の場合はそのまま返す

  let now = new Date();
  
  // 各数値を2桁固定にするヘルパー
  const pad = n => String(n).padStart(2, '0');
  let timeStr = `${pad(d.getHours())}:${pad(d.getMinutes())}`;

  // 年・月・日を比較するために日付の開始時刻を合わせる
  let dDate = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  let nowDate = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  let diffTime = nowDate.getTime() - dDate.getTime();
  let diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

  if (diffDays === 0) {
    return `今日 ${timeStr}`;
  } else if (diffDays === 1) {
    return `昨日 ${timeStr}`;
  } else if (d.getFullYear() === now.getFullYear()) {
    // 同じ年なら「月/日」表示
    return `${pad(d.getMonth() + 1)}/${pad(d.getDate())} ${timeStr}`;
  } else {
    // 違う年なら「年/月/日」表示
    return `${d.getFullYear()}/${pad(d.getMonth() + 1)}/${pad(d.getDate())} ${timeStr}`;
  }
}

function parseRichText(str){
  let escaped = str.replaceAll("<", "&lt;").replaceAll(">", "&gt;");
  escaped = escaped
    .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')       
    .replace(/__(.*?)__/g, '<u>$1</u>')           
    .replace(/`(.*?)`/g, '<code class="inline-code">$1</code>') 
    .replaceAll("\n", "<br>");                    
  return escaped;
}

async function send(){
  let msg = text.value.trim();
  if(msg == "" || !App.authUser) return;
  
  let currentNick = document.getElementById("display-nickname").innerText;
  let localData = {
    user: App.authUser,
    nickname: currentNick === "---" ? App.authUser : currentNick,
    profile: "",
    room: App.room,
    message: msg,
    time: new Date()
  };
  
  App.messages.push(localData);
  render();
  
  text.value = "";
  toast("送信中...");
  
  if(GAS){
    try {
      await fetch(GAS, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({
          authUser: App.authUser,
          authPass: App.authPass,
          room: App.room,
          message: msg
        })
      });
      
      toast("送信しました");
      setTimeout(load, 500);
    } catch(e) {
      console.log("送信エラー:", e);
      toast("送信に失敗しました");
    }
  }
}

text.addEventListener("keydown", e => {
  if(e.key === "Enter" && !e.shiftKey){
    e.preventDefault();
    send();
  }
});

init();
</script>
</body>
</html>
