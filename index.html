<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sky Chat</title>
<style>
:root {
  /* カラーパレットをより洗練されたトーンに微調整 */
  --bg: #1e1f22;
  --sidebar-bg: #2b2d31;
  --panel: #2b2d31;
  --panel2: #313338;
  --text: #f2f3f5;
  --sub: #949ba4;
  --accent: #5865f2;
  --accent-hover: #4752c4;
  --green: #23a55a;
  --radius-lg: 16px;
  --radius-md: 8px;
  --transition: all 0.2s ease;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
}

body {
  background: var(--bg);
  height: 100vh;
  display: flex;
  overflow: hidden;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

/* --- サイドバー --- */
#sidebar {
  width: 260px;
  background: var(--sidebar-bg);
  display: flex;
  flex-direction: column;
  border-right: 1px solid rgba(255, 255, 255, 0.05);
}

#logo {
  padding: 24px 20px;
  font-size: 20px;
  font-weight: 800;
  letter-spacing: 0.5px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
}

#userinfo {
  padding: 20px;
  font-size: 14px;
  color: var(--text);
  font-weight: 600;
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
}

#room-list {
  flex: 1;
  overflow-y: auto;
  padding: 10px 8px;
}

.room {
  padding: 10px 12px;
  border-radius: var(--radius-md);
  cursor: pointer;
  color: var(--sub);
  font-weight: 600;
  margin-bottom: 2px;
  transition: var(--transition);
}

.room:hover {
  background: rgba(255, 255, 255, 0.06);
  color: var(--text);
}

.room.active {
  background: rgba(255, 255, 255, 0.1);
  color: var(--text);
}

/* --- メインエリア --- */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--panel2);
}

#header {
  height: 60px;
  background: var(--panel2);
  display: flex;
  align-items: center;
  padding: 0 24px;
  font-size: 16px;
  font-weight: 700;
  border-bottom: 1px solid rgba(0, 0, 0, 0.2);
}

/* --- メッセージエリア --- */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.message {
  max-width: 65%;
  background: var(--sidebar-bg);
  padding: 14px 16px;
  border-radius: 0 var(--radius-lg) var(--radius-lg) var(--radius-lg); /* 左上だけ角を立たせる */
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
  animation: fade 0.25s ease-out;
  line-height: 1.5;
  font-size: 15px;
}

/* 自分のメッセージ */
.message.self {
  align-self: flex-end;
  background: var(--accent);
  border-radius: var(--radius-lg) 0 var(--radius-lg) var(--radius-lg); /* 右上だけ角を立たせる */
}

.name {
  font-size: 13px;
  font-weight: 700;
  color: var(--sub);
  margin-bottom: 6px;
}
.message.self .name {
  color: rgba(255, 255, 255, 0.8);
}

.time {
  font-size: 11px;
  color: var(--sub);
  margin-top: 6px;
  text-align: right;
}
.message.self .time {
  color: rgba(255, 255, 255, 0.7);
}

/* リッチテキスト（Markdown）用 */
.inline-code {
  background: rgba(0, 0, 0, 0.25);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: Consolas, Monaco, monospace;
  font-size: 0.9em;
  color: #ff79c6; /* コードを少し目立たせる色 */
}
.message.self .inline-code {
  background: rgba(0, 0, 0, 0.2);
  color: #fff;
}

/* --- 下部入力エリア --- */
#bottom {
  background: var(--panel2);
  padding: 0 24px 24px 24px;
  display: flex;
  gap: 12px;
  align-items: flex-end;
}

#text {
  flex: 1;
  resize: none;
  height: 48px;
  max-height: 150px;
  border: none;
  border-radius: var(--radius-md);
  padding: 14px 16px;
  background: #383a40;
  color: var(--text);
  font-size: 15px;
  line-height: 1.4;
  transition: var(--transition);
}

#text:focus {
  outline: none;
}

button {
  height: 48px;
  padding: 0 24px;
  border: none;
  border-radius: var(--radius-md);
  background: var(--accent);
  color: white;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
}

button:hover {
  background: var(--accent-hover);
}

/* --- 通知・モーダル（ログイン画面） --- */
#toast {
  position: fixed;
  bottom: 32px;
  right: 32px;
  background: var(--green);
  color: white;
  padding: 12px 24px;
  border-radius: var(--radius-md);
  font-weight: 600;
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
  display: none;
  z-index: 100;
}

.modal {
  position: fixed;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.8);
  backdrop-filter: blur(4px); /* 背景を少しぼかす */
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 200;
}

.modal-content {
  width: 360px;
  background: var(--sidebar-bg);
  padding: 30px;
  border-radius: var(--radius-lg);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
}

.modal-content h2 {
  font-size: 20px;
  margin-bottom: 20px;
  text-align: center;
}

.setting {
  margin-top: 20px;
  font-size: 14px;
  color: var(--sub);
}

.setting input {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  margin-bottom: 16px;
  background: #1e1f22;
  border: 1px solid rgba(0,0,0,0.2);
  border-radius: var(--radius-md);
  color: white;
  font-size: 14px;
}

.setting input:focus {
  outline: none;
  border-color: var(--accent);
}

.modal button {
  width: 100%;
  margin-top: 8px;
}

@keyframes fade {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* スマホ対応 */
@media(max-width:700px){
  #sidebar { display: none; }
  .message { max-width: 85%; }
  #bottom { padding: 0 12px 12px 12px; }
}
</style>
</head>
<body>

<div id="sidebar">
  <div id="logo">☁ Sky Chat</div>
  <div id="userinfo">ログイン中: <span id="display-username">---</span></div>
  <div id="room-list"></div>
</div>

<div id="main">
  <div id="header">Sky Chat</div>
  <div id="messages"></div>
  <div id="bottom">
    <textarea id="text" placeholder="メッセージを入力&#10;Shift+Enterで改行&#10;Enterで送信"></textarea>
    <button onclick="send()">送信</button>
    <button onclick="logout()" style="background:#4e5058;">ログアウト</button>
  </div>
</div>

<div id="toast">送信しました</div>

<div class="modal" id="loginModal">
  <div class="modal-content">
    <h2>Sky Chat ログイン</h2>
    <div class="setting">
      ユーザー名
      <input id="loginUser" placeholder="ユーザー名を入力">
      パスワード
      <input id="loginPass" type="password" placeholder="パスワードを入力">
    </div>
    <button onclick="login()">ログイン</button>
  </div>
</div>

<script>
// WebアプリのURLをここに貼り付けてください
const GAS="https://script.google.com/macros/s/AKfycbyKWav6fidXMcRB4xyCBeT5_DDf0ZpYiZ21Ir4wEiqyl80xItyOexTOF_P8aQJQulloaQ/exec";

const App={
  authUser:"",
  authPass:"",
  room:"雑談", // 初期デフォルトルーム
  messages:[],
  rooms: ["雑談"] // 初期ルームリスト
}

function init(){
  App.authUser = localStorage.getItem("chat_user") || "";
  App.authPass = localStorage.getItem("chat_pass") || "";
  
  if(App.authUser && App.authPass) {
    // ログイン情報が保存されていればメイン画面を表示
    document.getElementById("loginModal").style.display = "none";
    document.getElementById("display-username").innerText = App.authUser;
    load();
    setInterval(load, 2000);
  } else {
    // なければログインモーダルを固定表示
    document.getElementById("loginModal").style.display = "flex";
  }
}

async function login() {
  const u = document.getElementById("loginUser").value.trim();
  const p = document.getElementById("loginPass").value.trim();
  if(!u || !p) return alert("両方入力してください");
  
  // 入力情報で一度通信テストを行って認証
  try {
    let r = await fetch(`${GAS}?room=雑談&authUser=${encodeURIComponent(u)}&authPass=${encodeURIComponent(p)}`, {
      method: "GET",
      redirect: "follow"
    });
    let data = await r.json();
    
    if(data.error) {
      alert("ユーザー名またはパスワードが正しくありません");
    } else {
      // ログイン成功
      localStorage.setItem("chat_user", u);
      localStorage.setItem("chat_pass", p);
      App.authUser = u;
      App.authPass = p;
      
      document.getElementById("loginModal").style.display = "none";
      document.getElementById("display-username").innerText = u;
      
      App.messages = data.messages || [];
      if(data.rooms) App.rooms = data.rooms;
      
      renderRooms();
      render();
      setInterval(load, 2000);
    }
  } catch(e) {
    alert("認証通信に失敗しました。URLや接続を確認してください");
    console.log(e);
  }
}

function logout() {
  localStorage.removeItem("chat_user");
  localStorage.removeItem("chat_pass");
  location.reload();
}

function toast(text){
  const toastBox = document.getElementById("toast");
  toastBox.innerHTML = text;
  toastBox.style.display = "block";
  setTimeout(()=>{ toastBox.style.display="none"; }, 1500);
}

// サイドバーのルーム一覧を動的に描画
function renderRooms(){
  const container = document.getElementById("room-list");
  container.innerHTML = "";
  
  App.rooms.forEach(rName => {
    let div = document.createElement("div");
    div.className = "room";
    if(rName === App.room) {
      div.classList.add("active");
    }
    div.innerText = `# ${rName}`;
    
    div.onclick = () => {
      document.querySelectorAll(".room").forEach(v => v.classList.remove("active"));
      div.classList.add("active");
      App.room = rName;
      load();
    };
    container.appendChild(div);
  });
}

// メッセージのレンダリング
function render(){
  // 画面上のメッセージ数と、新しく届いたデータ数が同じなら何もしない（アニメーションの再発防止）
  const currentDOMCount = messages.querySelectorAll(".message").length;
  if (currentDOMCount === App.messages.length) {
    return; 
  }

  messages.innerHTML = "";
  App.messages.forEach(v => {
    let div = document.createElement("div");
    // ログイン中の自分の発言であれば吹き出しを右に寄せる (selfクラス付与)
    div.className = "message" + (v.user === App.authUser ? " self" : "");
    div.innerHTML = `
      <div class="name">${v.user}</div>
      <div>${parseRichText(v.message)}</div>
      <div class="time">${format(v.time)}</div>
    `;
    messages.appendChild(div);
  });
  
  // スクロールを一番下に移動
  messages.scrollTop = messages.scrollHeight;
}

async function load(){
  if(!GAS || !App.authUser) return;
  try{
    // 常に認証トークン(User/Pass)をセットしてリクエスト
    let r = await fetch(`${GAS}?room=${encodeURIComponent(App.room)}&authUser=${encodeURIComponent(App.authUser)}&authPass=${encodeURIComponent(App.authPass)}`, {
      method: "GET",
      redirect: "follow"
    });
    let data = await r.json();
    
    if(data.error) {
      // スプレッドシート側でアカウントが消されるなどした場合は強制ログアウト
      return logout();
    }
    
    // データをアプリ状態に保存
    App.messages = data.messages || [];
    
    // ルーム一覧の動的更新
    if (data.rooms && JSON.stringify(App.rooms) !== JSON.stringify(data.rooms)) {
      App.rooms = data.rooms;
      renderRooms();
    }
    
    // 画面の描画処理へ
    render();
  }catch(e){
    console.log("読み込みエラー:", e);
  }
}

function format(t){
  let d=new Date(t);
  return d.toLocaleTimeString();
}

// 安全にエスケープした後にリッチテキスト（Markdown）化
function parseRichText(str){
  // 1. まずHTMLタグを無効化（エスケープ）
  let escaped = str
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;");
    
  // 2. 簡易Markdown変換処理
  escaped = escaped
    .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')       // **太字** -> <b>
    .replace(/__(.*?)__/g, '<u>$1</u>')           // __下線__ -> <u>
    .replace(/`(.*?)`/g, '<code class="inline-code">$1</code>') // `コード` -> <code>
    .replaceAll("\n", "<br>");                    // 改行処理
    
  return escaped;
}

async function send(){
  let msg = text.value.trim();
  if(msg == "" || !App.authUser) return;
  
  // ローカル用の仮表示データを準備
  let currentNick = document.getElementById("display-nickname").innerText;
  let localData = {
    user: App.authUser,     // ★ここが判定（v.user === App.authUser）に使われます！
    nickname: currentNick, // 表示用のニックネーム
    profile: "",
    room: App.room,
    message: msg,
    time: new Date().toISOString() // タイムスタンプの形式を統一
  };
  
  // GASの返事を待たずにすぐ仮表示
  App.messages.push(localData);
  render();
  
  text.value = "";
  toast("送信中...");
  
  if(GAS){
    try {
      // 裏でGASに送信（authUser と authPass を渡す）
      await fetch(GAS, {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "text/plain"
        },
        body: JSON.stringify({
          authUser: App.authUser,
          authPass: App.authPass,
          room: App.room,
          message: msg
        })
      });
      
      toast("送信しました");
      // 送信完了後、少し待ってから最新の状態を読み込む
      setTimeout(load, 500);
    } catch(e) {
      console.log("送信エラー:", e);
      toast("送信に失敗しました");
    }
  }
}

init();
</script>
</body>
</html>
